<!DOCTYPE html>
<html lang="es">
<head>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 0.8rem; }
        .container-fluid { max-width: 98%; margin-top: 15px; }
        
        /* Estética de la Tabla ERP */
        .table-wrapper { max-height: 70vh; overflow-y: auto; overflow-x: auto; box-shadow: 0 4px 8px rgba(0,0,0,0.05); border-radius: 6px; background: white; border: 1px solid #ddd; }
        table { border-collapse: separate; border-spacing: 0; width: 100%; }
        th { position: sticky; top: 0; background-color: #0b2d4f !important; color: white !important; z-index: 2; white-space: nowrap; padding: 6px 10px !important; font-weight: 600; font-size: 0.75rem; vertical-align: top; }
        td { padding: 4px 6px !important; vertical-align: middle; white-space: nowrap; border-bottom: 1px solid #eee; }
        tr:hover td { background-color: #f1f7ff; }

        /* Campos Editables */
        input.cell-edit, select.cell-edit { width: 100%; min-width: 80px; border: 1px solid transparent; padding: 2px 4px; font-size: 0.75rem; border-radius: 3px; background-color: transparent; color: #333; }
        input.cell-edit:hover, select.cell-edit:hover { border: 1px solid #ccc; background-color: #fafafa; }
        input.cell-edit:focus, select.cell-edit:focus { border: 1px solid #0d6efd; background-color: #e9f2ff; outline: none; box-shadow: 0 0 0 2px rgba(13,110,253,.25); }
        
        /* Filtros en Encabezados */
        .filter-input { width: 100%; padding: 2px 4px; font-size: 0.7rem; border: 1px solid #3d648b; border-radius: 3px; background-color: #1a426b; color: white; margin-top: 4px; }
        .filter-input::placeholder { color: #a5c2e0; }
        .filter-input:focus { background-color: white; color: black; outline: none; border-color: #0d6efd; }

        /* Botones y Pestañas */
        .btn-accion { padding: 2px 6px; font-size: 0.7rem; border-radius: 4px; }
        .nav-tabs .nav-link { color: #555; font-size: 0.85rem; padding: 8px 16px; border: none; }
        .nav-tabs .nav-link.active { font-weight: 600; color: #0b2d4f; border-bottom: 3px solid #0d6efd; background-color: transparent; }
        .action-column { width: 60px; text-align: center; position: sticky; right: 0; background-color: #f8f9fa; z-index: 1; border-left: 2px solid #ddd;}
        th.action-column { background-color: #0b2d4f !important; border-left: none; }
    </style>
</head>

</div>

            row["Inicia_Obligatorio"] = "Ninguno";
            row["Finaliza_Obligatorio"] = "Ninguno";
            row["Regla_G1"] = "Ninguno";
            row["Prioridad_Flota"] = "Ninguno";
            necesitaGuardar = true;
        }
    });
    // Si se aplicó la migración automática, guardamos para que Capa 2 lo lea limpio
    if (necesitaGuardar) {
        localStorage.setItem('yms_maestros_data', JSON.stringify(maestrosData));
        console.log("Migración dinámica de rutas completada: Todas las tiendas excepto El Recreo ahora están en 'Ninguno'.");
    }
}

// Saber qué pestaña está activa
let currentSheet = 'Flota_Configurada';
document.querySelectorAll('button[data-bs-toggle="tab"]').forEach(btn => {
    btn.addEventListener('shown.bs.tab', event => {
        let targetId = event.target.getAttribute('data-bs-target').replace('#', '');
        if(targetId === 'flota') currentSheet = 'Flota_Configurada';
        if(targetId === 'tiendas') currentSheet = 'Tiendas_y_Ruteo_Patio';
        if(targetId === 'param') currentSheet = 'Parametros_Globales';
    });
});

function renderizarTabla(sheetName) {
    const tableEl = document.getElementById('tabla-' + sheetName);
    const thead = tableEl.querySelector('thead');
    const tbody = tableEl.querySelector('tbody');
    thead.innerHTML = ''; tbody.innerHTML = '';

    const data = maestrosData[sheetName];
    if (!data || data.length === 0) return;

    const columns = Object.keys(data[0]);
    
    // Crear Fila de Títulos y Filtros
    let trHead = document.createElement('tr');
    columns.forEach((col, idx) => {
        let th = document.createElement('th');
        th.innerHTML = `<div>${col}</div>`;
        
        let filterInput = document.createElement('input');
        filterInput.type = "text";
        filterInput.className = "filter-input";
        filterInput.placeholder = "Filtro...";
        filterInput.addEventListener('keyup', function() { filtrarTabla(tbody, idx, this.value); });
        
        th.appendChild(filterInput);
        trHead.appendChild(th);
    });

    let thAction = document.createElement('th');
    thAction.className = "action-column";
    thAction.textContent = "Acción";
    trHead.appendChild(thAction);
    thead.appendChild(trHead);

    // Crear Filas de Datos
    data.forEach((row, rowIndex) => {
        let tr = document.createElement('tr');
        columns.forEach(col => {
            let td = document.createElement('td');
            let valorActual = row[col] == null ? '' : String(row[col]).trim();

            if (configuracionDesplegables[sheetName] && configuracionDesplegables[sheetName][col]) {
                let select = document.createElement('select');
                select.className = 'cell-edit';
                let opciones = configuracionDesplegables[sheetName][col];
                
                if (valorActual && !opciones.includes(valorActual)) {
                    opciones.push(valorActual);
                }
                
                opciones.forEach(optValue => {
                    let option = document.createElement('option');
                    option.value = optValue;
                    option.textContent = optValue;
                    if (valorActual === optValue) option.selected = true;
                    select.appendChild(option);
                });
                
                select.addEventListener('change', function() { maestrosData[sheetName][rowIndex][col] = this.value; });
                td.appendChild(select);

            } else {
                let input = document.createElement('input');
                input.type = 'text';
                input.className = 'cell-edit';
                input.value = valorActual;
                
                if(col.includes('Hora')) input.setAttribute('list', 'sugerencias-horas');
                
                input.addEventListener('input', function() { maestrosData[sheetName][rowIndex][col] = this.value; });
                td.appendChild(input);
            }
            tr.appendChild(td);
        });

        let tdAction = document.createElement('td');
        tdAction.className = "action-column";
        let btnDel = document.createElement('button');
        btnDel.className = "btn btn-danger btn-accion";
        btnDel.innerHTML = "🗑️";
        btnDel.onclick = () => {
            if(confirm("¿Seguro que deseas eliminar esta fila?")) {
                maestrosData[sheetName].splice(rowIndex, 1);
                renderizarTabla(sheetName);
            }
        };
        tdAction.appendChild(btnDel);
        tr.appendChild(tdAction);
        
        tbody.appendChild(tr);
    });
}

function filtrarTabla(tbody, colIndex, valor) {
    let rows = tbody.querySelectorAll('tr');
    let search = valor.toLowerCase();
    rows.forEach(row => {
        let textCell = row.cells[colIndex].querySelector('input, select').value.toLowerCase();
        row.style.display = textCell.includes(search) ? '' : 'none';
    });
}

function agregarFila() {
    if(!maestrosData[currentSheet] || maestrosData[currentSheet].length === 0) return;
    let nuevoRegistro = {};
    let columnas = Object.keys(maestrosData[currentSheet][0]);
    columnas.forEach(c => {
        if(c === 'Estatus') nuevoRegistro[c] = 'Activo';
        else if (c === 'Modalidad') nuevoRegistro[c] = 'Propia';
        else nuevoRegistro[c] = '';
    });
    maestrosData[currentSheet].unshift(nuevoRegistro); 
    renderizarTabla(currentSheet);
}

// Inicializar
renderizarTabla('Flota_Configurada');
renderizarTabla('Tiendas_y_Ruteo_Patio');
renderizarTabla('Parametros_Globales');

function guardarMaestros() {
    localStorage.setItem('yms_maestros_data', JSON.stringify(maestrosData));
    alert('✅ DATOS GUARDADOS.\n\nSe han actualizado los parámetros en la memoria. El algoritmo de la Capa 2 tomará estos valores actualizados y aplicará el ruteo dinámico.');
}
