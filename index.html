<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YMS Daka - Control de Galpón</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        :root { --bg-dark: #0f172a; --panel-bg: #1e293b; --text-main: #f8fafc; --accent-blue: #38bdf8; --green: #22c55e; --red: #ef4444; --yellow: #eab308; --border-color: #334155; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg-dark); color: var(--text-main); margin: 0; padding: 10px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: #000; border-bottom: 2px solid var(--accent-blue); margin-bottom: 10px; }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .logo-img { height: 60px; object-fit: contain; }
        .header h1 { margin: 0; font-size: 1.4em; letter-spacing: 2px; color: var(--accent-blue); text-transform: uppercase; }
        .clock { font-size: 1.5em; font-weight: bold; color: var(--yellow); font-family: monospace; }
        .main-container { display: flex; gap: 15px; flex: 1; overflow: hidden; margin-bottom: 10px; }
        .sidebar { width: 320px; display: flex; flex-direction: column; gap: 15px; }
        .queue-panel, .en-ruta-panel { background: var(--panel-bg); border-radius: 8px; display: flex; flex-direction: column; border: 1px solid var(--border-color); flex: 1; min-height: 0; }
        .queue-header { background: var(--border-color); padding: 10px; font-weight: bold; text-align: center; border-radius: 8px 8px 0 0; }
        .ruta-header { background: #1e3a8a; padding: 10px; font-weight: bold; text-align: center; border-radius: 8px 8px 0 0; }
        .queue-list { padding: 10px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 10px; }
        .trk-card { background: #0f172a; border-left: 4px solid var(--yellow); padding: 10px; border-radius: 4px; cursor: pointer; transition: transform 0.2s; font-size: 0.85em; position: relative;}
        .trk-card:hover { transform: translateX(5px); background: #1e293b; border: 1px solid var(--accent-blue); }
        .trk-card.selected { border: 2px solid var(--accent-blue); background: #164e63; }
        .trk-id { font-weight: bold; color: var(--accent-blue); font-size: 1.1em; margin-bottom: 3px;}
        .trk-dest { color: #cbd5e1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px;}
        .trk-sap { font-size: 0.75em; color: var(--accent-blue); margin-bottom: 5px; font-family: monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}
        .trk-seq { color: var(--yellow); font-size: 0.85em; margin-top: 5px; font-weight: bold;}
        .badge-late { position: absolute; top: 5px; right: 5px; background: var(--red); color: white; padding: 2px 5px; font-size: 0.7em; border-radius: 3px; font-weight: bold; display: none;}
        .estatus-btn { display:inline-block; margin-top:5px; background:rgba(255,255,255,0.05); border:1px solid #475569; padding:4px 8px; border-radius:4px; transition:all 0.2s; cursor:pointer; }
        .estatus-btn:hover { background:rgba(255,255,255,0.1); }
        .yard-panel { flex: 1; display: flex; gap: 10px; overflow-y: auto; padding-right: 5px; }
        .galpon-col { flex: 1; background: var(--panel-bg); border-radius: 8px; border: 1px solid var(--border-color); display: flex; flex-direction: column; }
        .galpon-header { background: #1e293b; color: white; text-align: center; padding: 8px; font-weight: bold; font-size: 1.1em; border-bottom: 2px solid var(--border-color); border-radius: 8px 8px 0 0; letter-spacing: 1px;}
        .doors-container { padding: 8px; display: flex; flex-direction: column; gap: 8px; flex: 1; }
        .door { background: #000; border: 1px solid var(--border-color); border-radius: 6px; min-height: 130px; display: flex; flex-direction: column; position: relative; overflow: hidden; transition: all 0.3s;}
        .door-header { background: var(--border-color); padding: 5px 10px; font-weight: bold; font-size: 0.85em; display: flex; justify-content: space-between; }
        .door-content { padding: 8px; flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .empty-text { color: #475569; font-style: italic; cursor: pointer; padding: 10px; width: 100%; height: 100%; box-sizing: border-box; display: flex; align-items: center; justify-content: center; font-size: 0.9em;}
        .empty-text:hover { background: rgba(56, 189, 248, 0.1); color: var(--accent-blue); }
        .active-truck { width: 100%; display: flex; flex-direction: column; gap: 3px; font-size: 0.8em; text-align: left; }
        .lbl-flota { font-weight: bold; color: var(--accent-blue); font-size: 1.1em;}
        .lbl-dest { color: #f8fafc; }
        .lbl-time { font-size: 0.85em; color: var(--yellow); font-style: italic; font-weight: bold;}
        .timer-display { font-size: 1.6em; font-weight: bold; text-align: center; margin-top: 5px; font-family: monospace; color: var(--green);}
        .timer-display.warning { color: var(--yellow); }
        .door.retraso { animation: blinkRed 1.5s infinite; border-color: var(--red); }
        .door.retraso .timer-display { color: var(--red); }
        @keyframes blinkRed { 0% { box-shadow: 0 0 0px var(--red); background-color: #000; } 50% { box-shadow: inset 0 0 15px var(--red); background-color: rgba(239, 68, 68, 0.15); } 100% { box-shadow: 0 0 0px var(--red); background-color: #000; } }
        .door-controls { display: flex; border-top: 1px solid var(--border-color); }
        .door-btn { flex: 1; background: transparent; border: none; color: white; padding: 6px; cursor: pointer; font-weight: bold; font-size: 0.8em; transition: background 0.2s;}
        .door-btn:hover { background: var(--border-color); }
        .btn-start { color: white; background-color: rgba(34, 197, 94, 0.2); }
        .pulse-start { animation: pulseGreen 1.5s infinite; border: 1px solid var(--green); }
        @keyframes pulseGreen { 0% { box-shadow: 0 0 0px var(--green); } 50% { box-shadow: 0 0 10px var(--green); background-color: rgba(34, 197, 94, 0.5); } 100% { box-shadow: 0 0 0px var(--green); } }
        .btn-dispatch { color: var(--accent-blue); border-left: 1px solid var(--border-color);}
        .btn-dispatch:hover { background: rgba(56, 189, 248, 0.2); }
        .btn-cancel-anden { color: var(--red); border-left: 1px solid var(--border-color);}
        .btn-cancel-anden:hover { background: rgba(239, 68, 68, 0.2); }
        .btn-disabled { opacity: 0.3; pointer-events: none; }
        .kpi-bar { background: #000; border: 1px solid var(--border-color); border-radius: 8px; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; }
        .kpi-wrapper { display: flex; gap: 30px; }
        .kpi-item { display: flex; flex-direction: column; align-items: center; }
        .kpi-label { font-size: 0.75em; color: #94a3b8; text-transform: uppercase; font-weight: bold; letter-spacing: 1px;}
        .kpi-val { font-size: 1.4em; font-weight: bold; color: var(--accent-blue); }
        .btn-report { background: var(--yellow); color: #000; border: none; padding: 8px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 0.9em; transition: background 0.3s;}
        .btn-report:hover { background: #d97706; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 100; backdrop-filter: blur(3px);}
        .modal-content { background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 8px; padding: 25px; width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .modal-content.large { width: 95%; max-width: 1400px; max-height: 85vh; display: flex; flex-direction: column; }
        .modal-title { color: var(--red); margin-top: 0; font-size: 1.2em; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; display: flex; align-items: center; gap: 10px;}
        .form-group { margin-top: 15px; }
        .form-group label { display: block; font-size: 0.85em; color: #cbd5e1; margin-bottom: 5px; font-weight: bold;}
        .form-control { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid var(--border-color); background: #0f172a; color: white; font-family: inherit; font-size: 0.9em; box-sizing: border-box;}
        .modal-actions { margin-top: 20px; display: flex; justify-content: flex-end; gap: 10px; }
        .btn-save { background: var(--red); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-cancel { background: #64748b; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: background 0.3s;}
        .btn-cancel:hover { background: #475569; }
        .login-container { display: flex; justify-content: center; align-items: center; height: 100vh; background: var(--bg-dark); }
        .login-box { background: var(--panel-bg); padding: 30px; border-radius: 8px; width: 320px; text-align: center; border: 1px solid var(--border-color); }
        .login-box input { width: 100%; margin: 10px 0; padding: 10px; border-radius: 4px; border: 1px solid var(--border-color); background: #0f172a; color: white; }
        .login-box button { background: var(--accent-blue); color: #000; padding: 10px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; }
        .error-msg { color: var(--red); margin-top: 10px; }
        .table-wrap { overflow-y: auto; overflow-x: auto; flex: 1; margin-top: 15px; border: 1px solid var(--border-color); border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.85em; white-space: nowrap; }
        th, td { padding: 8px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { background: #000; color: var(--accent-blue); position: sticky; top: 0; }
        tr:hover { background: rgba(255,255,255,0.02); }
        .tag-ok { color: var(--green); font-weight: bold; }
        .tag-late { color: var(--red); font-weight: bold; }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    // Configuración Firebase
    const firebaseConfig = {
        apiKey: "AIzaSyDUUGll9Sjhw142PBc1KhShXSUUN59iI2Y",
        authDomain: "simulador-7af44.firebaseapp.com",
        databaseURL: "https://simulador-7af44-default-rtdb.firebaseio.com",
        projectId: "simulador-7af44",
        storageBucket: "simulador-7af44.firebasestorage.app",
        messagingSenderId: "763203204607",
        appId: "1:763203204607:web:688a418cad6b41194fe3ca",
        measurementId: "G-NVL4XJ03P2"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    // Mapeo de UIDs a galpones
    const uidToGalpon = {
        "X5kMN2kWXuNMdcrmVBC5wp9FR1I2": 1,
        "UpTHppmHP8c33gcYWQa24XiI2a73": 2,
        "t5r7uX7WdschI43l2WW8RufZxpd2": 3,
        "ZT8QXxeA2taE6pkutKPXm27y3Ww1": 4,
        "qW9SeYa0WwTwMCif4etKLE3xYfG3": "admin",
        "9OvNhdH7ErdpadjBJSLfEcjubI13": "monitor"
    };

    // Variables globales
    let camionesEnEspera = [];
    let camionesEnAnden = [];
    let camionesEnRuta = [];
    let historialOperacion = [];
    let camionSeleccionado = null;
    let timerIntervals = {};
    let idleIntervals = {};
    let galponActual = null;
    let currentUser = null;

    // Funciones auxiliares
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, function(m){ if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
    function formatoDiaHora(iso) { if(!iso) return '--:--'; const d=new Date(iso); return d.toLocaleTimeString('es-VE',{hour:'2-digit',minute:'2-digit'}); }
    function formatoFechaCorta(iso) { if(!iso) return '--/--/----'; const d=new Date(iso); return d.toLocaleDateString('es-VE',{day:'2-digit',month:'2-digit',year:'numeric'}); }
    function formatNumber(n) { return new Intl.NumberFormat('es-VE', {minimumFractionDigits:2, maximumFractionDigits:2}).format(n); }

    // --- Firebase listeners ---
    function iniciarListeners() {
        database.ref('patio/cola').on('value', snap => { camionesEnEspera = snap.val() || []; renderizarCola(); });
        database.ref('patio/andenes').on('value', snap => {
            const obj = snap.val() || {};
            const lista = [];
            for (let g in obj) {
                for (let p in obj[g]) {
                    if (obj[g][p]) lista.push(obj[g][p]);
                }
            }
            camionesEnAnden = lista;
            renderizarGalpones();
        });
        database.ref('patio/enRuta').on('value', snap => { camionesEnRuta = snap.val() || []; renderizarRuta(); });
        database.ref('patio/historial').on('value', snap => { historialOperacion = snap.val() || []; actualizarKPIs(); });
    }

    // --- Renderizado de cola ---
    function renderizarCola() {
        const container = document.getElementById('queue-list');
        if (!container) return;
        container.innerHTML = '';
        if (camionesEnEspera.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#64748b; margin-top:20px;">Patio despejado.</div>';
            return;
        }
        camionesEnEspera.forEach((camion, idx) => {
            const div = document.createElement('div');
            div.className = 'trk-card';
            div.innerHTML = `
                <div class="trk-id">${escapeHtml(camion.flota)}</div>
                <div class="trk-dest">Destino: ${escapeHtml(camion.destino)}</div>
                <div class="trk-sap">📦 SAP: ${escapeHtml(camion.documentos || 'S/N')}</div>
                <div class="trk-seq">📍 ${escapeHtml(camion.secuencia)}</div>
                <div style="margin-top:5px; font-size:0.8em;">Atención Pautada: ${formatoDiaHora(camion.llegadaProgramada)}</div>
                <div class="estatus-btn" onclick="abrirModalEstatus(${idx}, event)">⚙️ Estatus: ${escapeHtml(camion.estatusLogistico || 'DISPONIBLE')}</div>
            `;
            div.onclick = (e) => { if(e.target !== div && !e.target.classList.contains('estatus-btn')) seleccionarCamion(idx, div); };
            container.appendChild(div);
        });
    }

    function seleccionarCamion(idx, element) {
        document.querySelectorAll('.trk-card').forEach(el => el.classList.remove('selected'));
        element.classList.add('selected');
        camionSeleccionado = camionesEnEspera[idx];
        camionSeleccionado.queueIndex = idx;
    }

    function renderizarRuta() {
        const container = document.getElementById('ruta-list');
        if (!container) return;
        container.innerHTML = '';
        if (camionesEnRuta.length === 0) {
            container.innerHTML = '<div style="text-align:center; color:#64748b;">Sin unidades en tránsito.</div>';
            return;
        }
        camionesEnRuta.forEach((camion, idx) => {
            const div = document.createElement('div');
            div.className = 'trk-card';
            div.style.borderLeftColor = 'var(--accent-blue)';
            div.innerHTML = `
                <div class="trk-id">${escapeHtml(camion.flota)}</div>
                <div class="trk-dest">${escapeHtml(camion.destino)}</div>
                <div style="font-size:0.8em;">Salida Real: ${formatoDiaHora(camion.salidaReal)}</div>
                <button style="width:100%; padding:6px; background:var(--accent-blue); color:#000; border:none; font-weight:bold; border-radius:3px; cursor:pointer;" onclick="registrarRetorno(${idx})">🔙 REGISTRAR RETORNO</button>
            `;
            container.appendChild(div);
        });
    }

    function renderizarGalpones() {
        const yard = document.getElementById('yard-panel');
        if (!yard) return;
        yard.innerHTML = '';
        const col = document.createElement('div');
        col.className = 'galpon-col';
        col.innerHTML = `<div class="galpon-header">GALPÓN ${galponActual}</div>`;
        const doorsContainer = document.createElement('div');
        doorsContainer.className = 'doors-container';
        for (let p = 1; p <= 4; p++) {
            const doorId = `G${galponActual}-P${p}`;
            const door = document.createElement('div');
            door.className = 'door';
            door.id = doorId;
            door.innerHTML = `
                <div class="door-header"><span>🚪 ${doorId}</span><span class="status-indicator">Libre</span></div>
                <div class="door-content" id="content-${doorId}">
                    <div class="empty-text" onclick="verificarIngresoAnden('${doorId}')">Clic para llamar a Andén</div>
                </div>
            `;
            doorsContainer.appendChild(door);
        }
        col.appendChild(doorsContainer);
        yard.appendChild(col);
        // Restaurar camiones activos en este galpón
        camionesEnAnden.forEach(camion => {
            if (camion.puertaAsignada && camion.puertaAsignada.startsWith(`G${galponActual}`)) {
                restaurarAndenDOM(camion);
            }
        });
    }

    function restaurarAndenDOM(camion) {
        const doorId = camion.puertaAsignada;
        const doorDiv = document.getElementById(doorId);
        if (!doorDiv) return;
        const contentDiv = document.getElementById(`content-${doorId}`);
        const isCargando = camion.inicioCargaReal != null;
        contentDiv.innerHTML = `
            <div class="active-truck">
                <div class="lbl-flota">${escapeHtml(camion.flota)}</div>
                <div class="lbl-dest">${escapeHtml(camion.destino)}</div>
                <div style="font-size:0.75em;">YJ: <b>${escapeHtml(camion.yardJockey)}</b></div>
                <div class="lbl-time">Prog: ${formatoDiaHora(camion.llegadaProgramada)}</div>
                <div class="lbl-time">Límite Carga: ${camion.tiempoProgCarga} min</div>
                <div class="timer-display" id="timer-${doorId}">00:00</div>
            </div>
        `;
        const oldControls = doorDiv.querySelector('.door-controls');
        if (oldControls) oldControls.remove();
        const controls = document.createElement('div');
        controls.className = 'door-controls';
        controls.id = `ctrl-${doorId}`;
        controls.innerHTML = `
            <button class="door-btn btn-start ${isCargando ? '' : 'pulse-start'}" id="btn-start-${doorId}" onclick="iniciarCarga('${doorId}')" ${isCargando ? 'disabled style="color:#64748b;"' : ''}>${isCargando ? '⏳ EN PROCESO' : '▶ INICIAR CARGA'}</button>
            <button class="door-btn btn-dispatch ${isCargando ? '' : 'btn-disabled'}" id="btn-dispatch-${doorId}" onclick="verificarDespacho('${doorId}')">✔️ DESPACHAR</button>
            <button class="door-btn btn-cancel-anden" id="btn-cancel-${doorId}" onclick="intentarReversarAnden('${doorId}')" style="display: ${isCargando ? 'none' : 'block'};">✖ REVERSAR</button>
        `;
        doorDiv.appendChild(controls);
        doorDiv.querySelector('.status-indicator').innerText = isCargando ? 'CARGANDO' : 'ASIGNADO';
        doorDiv.querySelector('.status-indicator').style.color = isCargando ? 'var(--yellow)' : 'var(--accent-blue)';
        if (isCargando) {
            if (timerIntervals[doorId]) clearInterval(timerIntervals[doorId]);
            timerIntervals[doorId] = setInterval(() => {
                const elapsed = Math.floor((Date.now() - camion.inicioCargaReal) / 1000);
                const mins = Math.floor(elapsed / 60);
                const segs = elapsed % 60;
                const timerSpan = document.getElementById(`timer-${doorId}`);
                if (timerSpan) timerSpan.innerText = `${mins.toString().padStart(2,'0')}:${segs.toString().padStart(2,'0')}`;
                if (mins >= camion.tiempoProgCarga) {
                    doorDiv.classList.add('retraso');
                    doorDiv.querySelector('.status-indicator').innerText = '⛔ RETRASO';
                } else if (mins >= camion.tiempoProgCarga * 0.8) {
                    timerSpan.classList.add('warning');
                }
            }, 1000);
        } else {
            if (idleIntervals[doorId]) clearInterval(idleIntervals[doorId]);
            idleIntervals[doorId] = setInterval(() => {
                const minsIdle = Math.floor((Date.now() - camion.tiempoLlegadaAndenReal) / 60000);
                if (minsIdle >= 15 && !camion.idleJustificado) {
                    clearInterval(idleIntervals[doorId]);
                    abrirRCA(camion, 'Demora del Yard Jockey al Estacionar (> 15 min)', () => {
                        camion.idleJustificado = true;
                        actualizarCamionEnFirebase(camion);
                    });
                }
            }, 60000);
        }
    }

    // --- Acciones principales ---
    function verificarIngresoAnden(doorId) {
        if (!doorId.startsWith(`G${galponActual}`)) {
            alert("No tienes permisos para operar en otro galpón.");
            return;
        }
        if (!camionSeleccionado) return alert("Selecciona un vehículo de la fila.");
        // Validaciones simples (puedes agregar las de SLA, orden, etc.)
        procesarIngresoAnden(doorId);
    }

    async function procesarIngresoAnden(doorId) {
        const camion = { ...camionSeleccionado };
        camion.puertaAsignada = doorId;
        camion.tiempoLlegadaAndenReal = Date.now();
        camion.estado = `EN ANDÉN (${doorId})`;
        camion.inicioCargaReal = null;
        camion.tiempoRealCarga = null;
        // Remover de cola
        const idx = camionesEnEspera.findIndex(c => c.idViaje === camion.idViaje);
        if (idx !== -1) camionesEnEspera.splice(idx, 1);
        await database.ref('patio/cola').set(camionesEnEspera);
        const [galpon, puerta] = doorId.split('-');
        await database.ref(`patio/andenes/${galpon}/${puerta}`).set(camion);
        camionSeleccionado = null;
        renderizarCola();
    }

    function iniciarCarga(doorId) {
        const [galpon, puerta] = doorId.split('-');
        database.ref(`patio/andenes/${galpon}/${puerta}`).once('value', snap => {
            const camion = snap.val();
            if (!camion || camion.inicioCargaReal) return alert("La carga ya fue iniciada.");
            camion.inicioCargaReal = Date.now();
            camion.estado = `CARGANDO (${doorId})`;
            database.ref(`patio/andenes/${galpon}/${puerta}`).set(camion).then(() => {
                // Resetear intervalos y reconstruir DOM
                if (idleIntervals[doorId]) clearInterval(idleIntervals[doorId]);
                restaurarAndenDOM(camion);
            });
        });
    }

    function verificarDespacho(doorId) {
        const [galpon, puerta] = doorId.split('-');
        database.ref(`patio/andenes/${galpon}/${puerta}`).once('value', snap => {
            const camion = snap.val();
            if (!camion || !camion.inicioCargaReal) return alert("Debe iniciar la carga primero.");
            const finCarga = Date.now();
            const minutosCarga = Math.floor((finCarga - camion.inicioCargaReal) / 60000);
            camion.tiempoRealCarga = minutosCarga;
            if (minutosCarga > camion.tiempoProgCarga) {
                abrirRCA(camion, 'Retraso Operativo en Andén (Exceso de Tiempo de Carga)', () => procesarDespacho(doorId, camion));
            } else {
                procesarDespacho(doorId, camion);
            }
        });
    }

    function procesarDespacho(doorId, camion) {
        const [galpon, puerta] = doorId.split('-');
        if (timerIntervals[doorId]) clearInterval(timerIntervals[doorId]);
        // Mover a ruta o siguiente galpón (simplificado: asumimos que es el último destino)
        camion.salidaReal = new Date().toISOString();
        // Agregar a enRuta
        camionesEnRuta.push(camion);
        database.ref('patio/enRuta').set(camionesEnRuta);
        // Eliminar de anden
        database.ref(`patio/andenes/${galpon}/${puerta}`).remove();
        // Agregar a historial (opcional, se puede hacer al retornar)
        alert(`✅ Despachado ${camion.flota} hacia ${camion.destino}`);
    }

    function registrarRetorno(idx) {
        const camion = camionesEnRuta[idx];
        if (!confirm(`¿Registrar retorno de ${camion.flota}?`)) return;
        camion.retornoReal = new Date().toISOString();
        const diff = (new Date(camion.retornoReal) - new Date(camion.salidaReal)) / 3600000;
        camion.duracionViajeHoras = diff.toFixed(1);
        camion.fechaEjecucion = camion.retornoReal;
        // Mover a historial
        historialOperacion.push(camion);
        database.ref('patio/historial').set(historialOperacion);
        camionesEnRuta.splice(idx, 1);
        database.ref('patio/enRuta').set(camionesEnRuta);
        alert(`✅ Retorno registrado. Duración: ${camion.duracionViajeHoras} horas.`);
    }

    function intentarReversarAnden(doorId) {
        const [galpon, puerta] = doorId.split('-');
        database.ref(`patio/andenes/${galpon}/${puerta}`).once('value', snap => {
            const camion = snap.val();
            if (!camion) return;
            if (camion.inicioCargaReal) return alert("No se puede reversar, la carga ya inició.");
            abrirRCA(camion, 'Reverso de Asignación a Andén (Cancelado)', () => {
                database.ref(`patio/andenes/${galpon}/${puerta}`).remove();
                // Regresar a cola
                camionesEnEspera.unshift(camion);
                database.ref('patio/cola').set(camionesEnEspera);
                alert(`✅ Vehículo ${camion.flota} regresado a la cola.`);
            });
        });
    }

    function actualizarCamionEnFirebase(camion) {
        if (!camion.puertaAsignada) return;
        const [galpon, puerta] = camion.puertaAsignada.split('-');
        database.ref(`patio/andenes/${galpon}/${puerta}`).set(camion);
    }

    // --- RCA y modales ---
    let rcaPendingAction = null;
    let rcaCamionContext = null;
    function abrirRCA(camion, fase, callback) {
        rcaCamionContext = camion;
        rcaPendingAction = callback;
        const modal = document.getElementById('modal-rca');
        document.getElementById('rca-placa').value = camion.flota;
        document.getElementById('rca-fase').value = fase;
        document.getElementById('rca-motivo').value = "";
        document.getElementById('rca-obs').value = "";
        modal.style.display = 'flex';
    }
    function guardarRCA() {
        const motivo = document.getElementById('rca-motivo').value;
        const obs = document.getElementById('rca-obs').value;
        if(!motivo) return alert("Debe seleccionar una causa raíz.");
        if(!rcaCamionContext.incidencias) rcaCamionContext.incidencias = [];
        rcaCamionContext.incidencias.push(`[${document.getElementById('rca-fase').value}] ${motivo} - ${obs}`);
        document.getElementById('modal-rca').style.display = 'none';
        if(rcaPendingAction) rcaPendingAction();
        rcaCamionContext = null;
        rcaPendingAction = null;
    }
    function cancelarRCA() {
        document.getElementById('modal-rca').style.display = 'none';
        rcaCamionContext = null;
        rcaPendingAction = null;
    }

    function abrirModalEstatus(idx, event) {
        event.stopPropagation();
        const camion = camionesEnEspera[idx];
        document.getElementById('modal-estatus-placa').innerText = camion.flota;
        document.getElementById('sel-estatus').value = camion.estatusLogistico || 'DISPONIBLE EN PATIO';
        document.getElementById('sel-jockey').value = camion.yardJockey || 'Sin Asignar';
        document.getElementById('modal-estatus').setAttribute('data-idx', idx);
        document.getElementById('modal-estatus').style.display = 'flex';
    }
    function guardarEstatus() {
        const idx = document.getElementById('modal-estatus').getAttribute('data-idx');
        const camion = camionesEnEspera[idx];
        camion.estatusLogistico = document.getElementById('sel-estatus').value;
        camion.yardJockey = document.getElementById('sel-jockey').value;
        database.ref('patio/cola').set(camionesEnEspera);
        document.getElementById('modal-estatus').style.display = 'none';
        renderizarCola();
    }

    function actualizarKPIs() {
        const total = historialOperacion.length;
        let incidencias = 0;
        historialOperacion.forEach(h => { if(h.incidencias) incidencias += h.incidencias.length; });
        document.getElementById('kpi-total').innerText = total;
        document.getElementById('kpi-incidencias').innerText = incidencias;
        // OTIF y promedio se pueden calcular, simplificado
    }

    function abrirModalReporte() {
        const modal = document.getElementById('modal-reporte');
        const tbody = document.getElementById('tb-historico');
        if (!tbody) return;
        tbody.innerHTML = '';
        if (historialOperacion.length === 0) {
            tbody.innerHTML = '<tr><td colspan="16">No hay despachos finalizados aún.</td></tr>';
        } else {
            historialOperacion.forEach(h => {
                const row = `<tr>
                    <td>${formatoFechaCorta(h.fechaEjecucion)}</td>
                    <td>${h.idViaje || 'N/A'}</td>
                    <td>${escapeHtml(h.flota)}</td>
                    <td>${escapeHtml(h.destino)}</td>
                    <td>${escapeHtml(h.documentos || 'N/A')}</td>
                    <td>${escapeHtml(h.puertaAsignada || 'N/A')}</td>
                    <td>${formatoDiaHora(h.llegadaProgramada)}</td>
                    <td>${formatoDiaHora(h.llegadaReal)}</td>
                    <td>${h.llegadaReal ? Math.floor((new Date(h.llegadaReal)-new Date(h.llegadaProgramada))/60000)+' min' : 'N/A'}</td>
                    <td>${h.tiempoProgCarga || 0} min</td>
                    <td>${h.tiempoRealCarga || 0} min</td>
                    <td>${h.tiempoRealCarga && h.tiempoProgCarga ? (h.tiempoRealCarga - h.tiempoProgCarga)+' min' : 'N/A'}</td>
                    <td>${formatoDiaHora(h.salidaReal)}</td>
                    <td>${formatoDiaHora(h.retornoReal)}</td>
                    <td>${h.duracionViajeHoras ? h.duracionViajeHoras+' hrs' : 'N/A'}</td>
                    <td>${h.incidencias ? h.incidencias.join(' | ') : 'Sin incidencias'}</td>
                </tr>`;
                tbody.innerHTML += row;
            });
        }
        modal.style.display = 'flex';
    }
    function cerrarModalReporte() { document.getElementById('modal-reporte').style.display = 'none'; }
    function abrirMonitorTV() { window.open('monitor_tv.html', '_blank'); }

    // --- Interfaz principal después del login ---
    function mostrarInterfaz(galpon) {
        galponActual = galpon;
        document.getElementById('app').innerHTML = `
            <div class="header">
                <div class="header-left"><img src="LOGO_DAKA.png" class="logo-img" onerror="this.style.display='none'"><h1>Control Galpón ${galpon}</h1><button class="btn-proyectar" onclick="abrirMonitorTV()">📺 Proyectar FIDS al TV</button></div>
                <div class="clock" id="main-clock">00:00:00</div>
            </div>
            <div class="main-container">

                </div>

            </div>
            <div class="kpi-bar">

                    <div class="kpi-item"><span class="kpi-label">OTIF Andén (A Tiempo)</span><span class="kpi-val" id="kpi-otif" style="color: var(--green);">100%</span></div>
                    <div class="kpi-item"><span class="kpi-label">Tiempo Promedio Carga</span><span class="kpi-val" id="kpi-avg">0 min</span></div>
                    <div class="kpi-item"><span class="kpi-label">Incidencias (RCA)</span><span class="kpi-val" id="kpi-incidencias" style="color: var(--red);">0</span></div>

                <div class="form-group"><label>Yard Jockey</label><select class="form-control" id="sel-jockey"><option>Sin Asignar</option><option>Chofer de Guardia 1</option><option>Chofer de Guardia 2</option><option>Chofer de Guardia 3</option><option>Chofer de Guardia 4</option></select></div>

                <div class="form-group"><label>Fase del Retraso</label><input type="text" class="form-control" id="rca-fase" disabled></div>

                <div class="form-group"><label>Observaciones</label><input type="text" class="form-control" id="rca-obs"></div>
                <div class="modal-actions"><button class="btn-cancel" onclick="cancelarRCA()">Cancelar</button><button class="btn-save" onclick="guardarRCA()">Guardar Incidencia</button></div></div>

                <div class="table-wrap"><table id="tabla-historico"><thead><tr><th>Fecha</th><th>ID Viaje</th><th>Flota</th><th>Destino</th><th>Docs SAP</th><th>Puerta</th><th>Llegada Prog.</th><th>Llegada Real</th><th>Dif. Llegada</th><th>Carga Prog.</th><th>Carga Real</th><th>Dif. Carga</th><th>Salida CDD</th><th>Retorno</th><th>Dur. Viaje</th><th>Causa Raíz</th></tr></thead><tbody id="tb-historico"></tbody></table></div></div>

        `;
        iniciarListeners();
        renderizarGalpones();
        setInterval(() => {
            const reloj = document.getElementById('main-clock');
            if(reloj) reloj.innerText = new Date().toLocaleTimeString();
        }, 1000);
    }

    // --- Login y autenticación ---
    function mostrarLogin() {
        document.getElementById('app').innerHTML = `
            <div class="login-container">
                <div class="login-box">
                    <h2>Iniciar Sesión</h2>
                    <input type="email" id="login-email" placeholder="Email" autocomplete="off">
                    <input type="password" id="login-password" placeholder="Contraseña">
                    <button id="login-btn">Ingresar</button>
                    <div id="login-error" class="error-msg"></div>
                </div>
            </div>
        `;
        document.getElementById('login-btn').addEventListener('click', () => {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-password').value;
            auth.signInWithEmailAndPassword(email, pass)
                .then(userCred => {
                    const uid = userCred.user.uid;
                    const galpon = uidToGalpon[uid];
                    if (!galpon) {
                        document.getElementById('login-error').innerText = 'Usuario no autorizado.';
                        auth.signOut();
                        return;
                    }
                    if (galpon === 'monitor') {
                        window.location.href = 'monitor_tv.html';
                    } else if (galpon === 'admin') {
                        mostrarInterfaz(1); // admin puede operar galpón 1
                    } else if (typeof galpon === 'number') {
                        mostrarInterfaz(galpon);
                    } else {
                        document.getElementById('login-error').innerText = 'Rol no válido.';
                        auth.signOut();
                    }
                })
                .catch(err => document.getElementById('login-error').innerText = 'Error: ' + err.message);
        });
    }

    auth.onAuthStateChanged(user => {
        if (user) {
            const uid = user.uid;
            const galpon = uidToGalpon[uid];
            if (galpon === 'monitor') {
                window.location.href = 'monitor_tv.html';
            } else if (galpon) {
                mostrarInterfaz(typeof galpon === 'number' ? galpon : 1);
            } else {
                auth.signOut();
                mostrarLogin();
            }
        } else {
            mostrarLogin();
        }
    });
</script>
