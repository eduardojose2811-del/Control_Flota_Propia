<!DOCTYPE html>
<html>
<head>
    <title>Monitor TV</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>
    <h1>MONITOR DE ANDENES</h1>
    <div id="status"></div>
    <table border="1" id="tabla"><thead><tr><th>Vehículo</th><th>Destino</th><th>Andén</th><th>Estado</th></tr></thead><tbody></tbody></table>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDUUGll9Sjhw142PBc1KhShXSUUN59iI2Y",
            authDomain: "simulador-7af44.firebaseapp.com",
            databaseURL: "https://simulador-7af44-default-rtdb.firebaseio.com",
            projectId: "simulador-7af44",
            storageBucket: "simulador-7af44.firebasestorage.app",
            messagingSenderId: "763203204607",
            appId: "1:763203204607:web:688a418cad6b41194fe3ca"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        db.ref('patio/andenes').on('value', snap => {
            const obj = snap.val() || {};
            const tbody = document.querySelector('#tabla tbody');
            tbody.innerHTML = '';
            let count = 0;
            for (let g in obj) {
                for (let p in obj[g]) {
                    const c = obj[g][p];
                    if (c && c.flota) {
                        count++;
                        tbody.innerHTML += `<tr><td>${c.flota}</td><td>${c.destino}</td><td>${g}-${p}</td><td>${c.estado || 'ASIGNADO'}</td></tr>`;
                    }
                }
            }
            document.getElementById('status').innerText = `${count} vehículo(s) en andenes.`;
        });
    </script>
</body>
</html>
