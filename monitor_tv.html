<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DAKA - Monitor de Todos los Galpones</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        body { background: #050a12; color: white; font-family: Arial; margin: 0; padding: 20px; }
        h1 { color: #facc15; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #334155; }
        th { color: #38bdf8; }
        .blink { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
        .empty { text-align: center; color: #64748b; margin-top: 40px; }
        .galpon-tag { display: inline-block; padding: 2px 8px; border-radius: 12px; font-size: 0.8em; font-weight: bold; margin-left: 8px; }
        .G1 { background-color: #3b82f6; }
        .G2 { background-color: #10b981; }
        .G3 { background-color: #f59e0b; }
        .G4 { background-color: #ef4444; }
    </style>
</head>
<body>
    <h1>MONITOR DE ANDENES - TODOS LOS GALPONES</h1>
    <div id="status">Conectando a Firebase...</div>
    <div style="overflow-x: auto;">
        <table id="tabla">
            <thead><tr><th>Vehículo</th><th>Destino</th><th>Andén</th><th>Estado</th></tr></thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
    <div id="empty" class="empty">No hay vehículos en andenes</div>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDUUGll9Sjhw142PBc1KhShXSUUN59iI2Y",
            authDomain: "simulador-7af44.firebaseapp.com",
            databaseURL: "https://simulador-7af44-default-rtdb.firebaseio.com",
            projectId: "simulador-7af44",
            storageBucket: "simulador-7af44.firebasestorage.app",
            messagingSenderId: "763203204607",
            appId: "1:763203204607:web:688a418cad6b41194fe3ca"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        database.ref('patio/andenes').on('value', (snap) => {
            const obj = snap.val() || {};
            const tbody = document.getElementById('tbody');
            const empty = document.getElementById('empty');
            tbody.innerHTML = '';
            let count = 0;
            for (let galpon in obj) {
                for (let puerta in obj[galpon]) {
                    const camion = obj[galpon][puerta];
                    if (camion && camion.flota) {
                        count++;
                        let estado = camion.estado || (camion.inicioCargaReal ? 'CARGANDO' : 'ASIGNADO');
                        if (estado === 'CARGANDO') estado = '<span class="blink" style="color:#4ade80;">CARGANDO</span>';
                        const row = document.createElement('tr');
                        row.innerHTML = `
                            <td>${camion.flota}</td>
                            <td>${camion.destino || ''}</td>
                            <td><span class="galpon-tag ${galpon}">${galpon}</span> - ${puerta}</td>
                            <td>${estado}</td>
                        `;
                        tbody.appendChild(row);
                    }
                }
            }
            empty.style.display = count === 0 ? 'block' : 'none';
            document.getElementById('status').innerHTML = `✅ ${count} vehículo(s) en andenes | Actualizado en tiempo real`;
        });
    </script>
</body>
</html>
