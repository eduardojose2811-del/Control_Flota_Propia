<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Monitor TV - DAKA</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        body { background: #050a12; color: white; font-family: Arial; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #facc15; padding-bottom: 10px; }
        h1 { color: #facc15; margin: 0; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        th, td { text-align: left; padding: 12px; border-bottom: 1px solid #334155; }
        th { color: #38bdf8; }
        .login-box { max-width: 300px; margin: 100px auto; background: #1e293b; padding: 20px; border-radius: 8px; }
        input, button { width: 100%; margin: 8px 0; padding: 10px; border-radius: 4px; border: none; }
        button { background: #facc15; color: black; font-weight: bold; cursor: pointer; }
        .empty { text-align: center; color: #64748b; margin-top: 40px; }
        .blink { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.3; } }
    </style>
</head>
<body>
<div id="app"></div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDUUGll9Sjhw142PBc1KhShXSUUN59iI2Y",
        authDomain: "simulador-7af44.firebaseapp.com",
        databaseURL: "https://simulador-7af44-default-rtdb.firebaseio.com",
        projectId: "simulador-7af44",
        storageBucket: "simulador-7af44.firebasestorage.app",
        messagingSenderId: "763203204607",
        appId: "1:763203204607:web:688a418cad6b41194fe3ca"
    };
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const auth = firebase.auth();

    let datos = [];
    let pagina = 0;
    const porPagina = 7;

    function mostrarTV() {
        document.getElementById('app').innerHTML = `
            <div class="header"><div><h1>SALIDAS / DEPARTURES</h1><p>Monitor de Transporte - CDD</p></div><div id="reloj">--:--:--</div></div>
            <table><thead><tr><th>Vehículo</th><th>Destino</th><th>Documentos</th><th>Vol (m³)</th><th>Andén</th><th>Estatus</th></tr></thead><tbody id="tabla-body"></tbody></table>
            <div id="empty" class="empty">Esperando despachos...</div>
        `;
        setInterval(() => document.getElementById('reloj').innerText = new Date().toLocaleTimeString(), 1000);
        database.ref('patio/andenes').on('value', snap => {
            const obj = snap.val() || {};
            const lista = [];
            for (let g in obj) for (let p in obj[g]) {
                let c = obj[g][p];
                if (c && c.flota) lista.push({
                    flota: c.flota,
                    destino: c.destino,
                    docs: c.documentos || 'S/N',
                    vol: c.volumen || 0,
                    anden: `${g}-${p}`,
                    estado: c.estado || (c.inicioCargaReal ? 'CARGANDO' : 'ASIGNADO')
                });
            }
            datos = lista;
            renderizarTabla();
        });
    }

    function renderizarTabla() {
        const tbody = document.getElementById('tabla-body');
        const empty = document.getElementById('empty');
        if (!tbody) return;
        if (datos.length === 0) { empty.style.display = 'block'; tbody.innerHTML = ''; return; }
        empty.style.display = 'none';
        const inicio = pagina * porPagina;
        const pag = datos.slice(inicio, inicio + porPagina);
        tbody.innerHTML = '';
        pag.forEach(d => {
            let estadoHtml = d.estado;
            if (d.estado === 'CARGANDO') estadoHtml = '<span class="blink" style="color:#4ade80;">CARGANDO</span>';
            else if (d.estado === 'RETRASO') estadoHtml = '<span class="blink" style="color:#ef4444;">RETRASO</span>';
            tbody.innerHTML += `<tr><td>${escapeHtml(d.flota)}</td><td>${escapeHtml(d.destino)}</td><td><small>${escapeHtml(d.docs)}</small></td><td>${d.vol.toFixed(2)}</td><td>${escapeHtml(d.anden)}</td><td>${estadoHtml}</td></tr>`;
        });
        if (datos.length > porPagina) setTimeout(() => { pagina = (pagina + 1) % Math.ceil(datos.length / porPagina); renderizarTabla(); }, 10000);
    }

    function escapeHtml(s) { return String(s).replace(/[&<>]/g, function(m){ return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]; }); }

    function mostrarLogin() {
        document.getElementById('app').innerHTML = `
            <div class="login-box">
                <h2>Acceso Monitor TV</h2>
                <input type="email" id="email" placeholder="Email">
                <input type="password" id="pass" placeholder="Contraseña">
                <button id="btn">Ingresar</button>
                <div id="error" style="color:red; margin-top:10px;"></div>
            </div>
        `;
        document.getElementById('btn').onclick = () => {
            auth.signInWithEmailAndPassword(document.getElementById('email').value, document.getElementById('pass').value)
                .then(() => mostrarTV())
                .catch(e => document.getElementById('error').innerText = e.message);
        };
    }

    auth.onAuthStateChanged(user => { if (user) mostrarTV(); else mostrarLogin(); });
</script>
</body>
</html>
